title: Alejandro Sierra
description: >-
  Delivery Manager AI-Native and Quality Engineering Leader. Predictable
  delivery, quality strategy and agentic tooling across multi-team programs.
url: "https://alejandrosierra.dev"
baseurl: ""

permalink: /postmortem/:title/

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# GoatCounter site code (the part before ".goatcounter.com" in your
# dashboard URL). Leave blank to keep analytics disabled.
goatcounter: ""

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - README.md
  - PUBLISHING.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - node_modules
  - scripts
  - vendor
