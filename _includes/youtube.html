<div class="pm-video">
  <iframe
    src="https://www.youtube-nocookie.com/embed/{{ include.id }}"
    title="{{ include.title | default: 'Embedded video' }}"
    loading="lazy"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen
  ></iframe>
</div>
