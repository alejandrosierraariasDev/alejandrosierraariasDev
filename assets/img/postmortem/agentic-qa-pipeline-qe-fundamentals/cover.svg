<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Abstract cover art: a pipeline of nodes passing through a quality gate">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f151d"/>
      <stop offset="1" stop-color="#0b0f14"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4fd1c5"/>
      <stop offset="1" stop-color="#7c9eff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>

  <line x1="60" y1="200" x2="340" y2="200" stroke="url(#flow)" stroke-width="3" stroke-linecap="round"/>

  <circle cx="60" cy="200" r="12" fill="#4fd1c5"/>
  <circle cx="150" cy="200" r="12" fill="#4fd1c5" opacity="0.85"/>

  <g transform="translate(200,200)">
    <rect x="-22" y="-22" width="44" height="44" rx="10" transform="rotate(45)" fill="#0b0f14" stroke="#7c9eff" stroke-width="3"/>
    <path d="M-9 0 L-2 8 L11 -9" stroke="#7c9eff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <circle cx="250" cy="200" r="12" fill="#7c9eff" opacity="0.85"/>
  <circle cx="340" cy="200" r="14" fill="#7c9eff"/>

  <g opacity="0.35" stroke="#223041" stroke-width="1">
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
  </g>
</svg>
